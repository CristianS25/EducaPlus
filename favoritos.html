<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Favoritos</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Mis cursos favoritos</h1>

<div id="favoritosGrid"></div>

<script src="app.js"></script>

<script>

var favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

var cursos = JSON.parse(localStorage.getItem("cursos")) || [];

var container = document.getElementById("favoritosGrid");

var html = "";

favoritos.forEach(function(id){

var course = cursos.find(c => c.id == id);

if(course){

html +=
'<div class="course-card">'+
'<img src="'+(course.imagen || "https://images.unsplash.com/photo-1588912914078-2fe5224fd8b8?w=400")+'">'+
'<h3>'+course.nombre+'</h3>'+
'<p>'+course.descripcion+'</p>'+
'</div>';

}

});

container.innerHTML = html;

</script>

</body>
</html>
